# gitleaks configuration
# https://github.com/gitleaks/gitleaks
#
# Extends the shared base ruleset from vercel-deploy-scripts.
# Only project-specific rules and allowlists are defined below.

title = "hidden-role-game"

[extend]
path = "node_modules/vercel-deploy-scripts/.gitleaks.toml"

[allowlist]
description = "Known safe patterns — placeholder values in documentation and config examples"
regexes = [
  # Lowercase placeholder values used in .env.example and documentation
  '''your-project-id''',
  '''your-project''',
  '''firebase-adminsdk-xxx''',
]
paths = [
  ".env.example",
]
