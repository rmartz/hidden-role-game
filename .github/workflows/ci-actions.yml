name: CI

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  backend-tests:
    name: Backend Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10
      - uses: actions/setup-node@v4
        with:
          node-version: 24.x
          cache: "pnpm"
      - run: pnpm install --frozen-lockfile
      - run: pnpm --filter=@secret-villain/backend test

  backend-lint:
    name: Backend Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10
      - uses: actions/setup-node@v4
        with:
          node-version: 24.x
          cache: "pnpm"
      - run: pnpm install --frozen-lockfile
      - run: pnpm --filter=@secret-villain/backend run lint

  frontend-tests:
    name: Frontend Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10
      - uses: actions/setup-node@v4
        with:
          node-version: 24.x
          cache: "pnpm"
      - run: pnpm install --frozen-lockfile
      - run: pnpm --filter=@secret-villain/ui test

  frontend-lint:
    name: Frontend Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10
      - uses: actions/setup-node@v4
        with:
          node-version: 24.x
          cache: "pnpm"
      - run: pnpm install --frozen-lockfile
      - run: pnpm --filter=@secret-villain/ui run lint

  frontend-build:
    name: Frontend Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10
      - uses: actions/setup-node@v4
        with:
          node-version: 24.x
          cache: "pnpm"
      - run: pnpm install --frozen-lockfile
      - run: pnpm --filter=@secret-villain/ui run build

  api-schema-stale:
    name: API Schema Up To Date
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10
      - uses: actions/setup-node@v4
        with:
          node-version: 24.x
          cache: "pnpm"
      - run: pnpm install --frozen-lockfile
      - run: pnpm --filter=@secret-villain/backend run generate:api
      - run: git diff --exit-code backend/openapi/openapi.yaml
