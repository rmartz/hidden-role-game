name: CI

on:
  push:
    branches: ["main"]
  pull_request:

permissions:
  contents: read

jobs:
  tests:
    name: Tests
    runs-on: ubuntu-latest
    timeout-minutes: 2
    steps:
      - uses: actions/checkout@v7
      - uses: ./.github/actions/setup
      # Headless suites only (node / hooks / components) — no browser, so this
      # job stays fast and skips the Playwright install. The browser-based
      # storybook project runs separately in `storybook-tests`.
      - run: pnpm exec vitest run --project node --project hooks --project components

  storybook-tests:
    name: Storybook Tests
    runs-on: ubuntu-latest
    timeout-minutes: 4
    steps:
      - uses: actions/checkout@v7
      - uses: ./.github/actions/setup
      - name: Install Playwright Chromium
        # Retry: the browser/system-deps install hits transient apt/CDN failures.
        run: |
          for i in 1 2 3; do
            if pnpm exec playwright install chromium --with-deps; then
              exit 0
            fi
            echo "playwright install failed (attempt $i/3) — retrying in 5s"
            sleep 5
          done
          exit 1
      - run: pnpm exec vitest run --project storybook

  lint:
    name: Lint
    runs-on: ubuntu-latest
    timeout-minutes: 2
    steps:
      - uses: actions/checkout@v7
      - uses: ./.github/actions/setup
      - run: pnpm lint

  format:
    name: Format
    runs-on: ubuntu-latest
    timeout-minutes: 2
    steps:
      - uses: actions/checkout@v7
      - uses: ./.github/actions/setup
      - run: pnpm run format:check

  typecheck:
    name: Typecheck
    runs-on: ubuntu-latest
    timeout-minutes: 1
    steps:
      - uses: actions/checkout@v7
      - uses: ./.github/actions/setup
      - run: pnpm tsc

  build:
    name: Build
    runs-on: ubuntu-latest
    timeout-minutes: 2
    steps:
      - uses: actions/checkout@v7
      - uses: ./.github/actions/setup
      - run: pnpm build

  sentry-release:
    name: Sentry Release
    runs-on: ubuntu-latest
    timeout-minutes: 2
    if: github.event_name == 'push'
    needs: [tests, lint, format, typecheck, build]
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
      - uses: getsentry/action-release@v3
        env:
          SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}
          SENTRY_ORG: reedmartz
          SENTRY_PROJECT: hidden-role-game
        with:
          environment: production
          version: ${{ github.sha }}
