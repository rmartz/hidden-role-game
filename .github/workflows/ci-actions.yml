name: CI

on:
  push:
    branches: ["main"]
  pull_request:

permissions:
  contents: read

jobs:
  # Decide whether the heavy jobs (tests / storybook-* / build / typecheck) need
  # to run. They are skipped only when a PR changes *nothing but* provably-inert
  # documentation — a DENYLIST, not a code allowlist: anything not matched here
  # (including .mdx, package.json, lockfiles, configs, workflows, assets) fails
  # SAFE and runs the full suite. Non-PR events (push to main) always run
  # everything. Format + Lint are never gated (Prettier validates .md).
  detect-changes:
    name: Detect code changes
    runs-on: ubuntu-latest
    timeout-minutes: 1
    outputs:
      code_changed: ${{ steps.detect.outputs.code_changed }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
      - id: detect
        env:
          EVENT_NAME: ${{ github.event_name }}
          BASE_REF: ${{ github.base_ref }}
        run: |
          if [ "$EVENT_NAME" != "pull_request" ]; then
            echo "Not a pull_request event — running the full suite."
            echo "code_changed=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          git fetch --quiet origin "$BASE_REF"
          changed=$(git diff --name-only "origin/$BASE_REF...HEAD")
          echo "Changed files:"
          echo "$changed"
          code_changed=false
          while IFS= read -r file; do
            [ -z "$file" ] && continue
            case "$file" in
              *.mdx) code_changed=true; break;;
              *.md | docs/* | LICENSE | *.txt) ;;
              *)
                code_changed=true
                break
                ;;
            esac
          done <<< "$changed"
          echo "Resolved code_changed=$code_changed"
          echo "code_changed=$code_changed" >> "$GITHUB_OUTPUT"

  tests:
    name: Tests
    runs-on: ubuntu-latest
    timeout-minutes: 2
    needs: detect-changes
    if: needs.detect-changes.outputs.code_changed == 'true'
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: ./.github/actions/setup
      # Headless suites only (node / hooks / components) — no browser, so this
      # job stays fast and skips the Playwright install. The browser-based
      # storybook project runs separately in `storybook-tests`.
      - run: pnpm exec vitest run --project node --project hooks --project components

  storybook-tests:
    name: Storybook Tests
    runs-on: ubuntu-latest
    timeout-minutes: 4
    needs: detect-changes
    if: needs.detect-changes.outputs.code_changed == 'true'
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: ./.github/actions/setup
        with:
          playwright: chromium
      - run: pnpm exec vitest run --project storybook

  lint:
    name: Lint
    runs-on: ubuntu-latest
    timeout-minutes: 2
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: ./.github/actions/setup
      - run: pnpm lint

  format:
    name: Format
    runs-on: ubuntu-latest
    timeout-minutes: 2
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: ./.github/actions/setup
      - run: pnpm run format:check

  typecheck:
    name: Typecheck
    runs-on: ubuntu-latest
    timeout-minutes: 1
    needs: detect-changes
    if: needs.detect-changes.outputs.code_changed == 'true'
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: ./.github/actions/setup
      - run: pnpm tsc

  build:
    name: Build
    runs-on: ubuntu-latest
    timeout-minutes: 2
    needs: detect-changes
    if: needs.detect-changes.outputs.code_changed == 'true'
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: ./.github/actions/setup
      - run: pnpm build

  # Gating coverage for the production Storybook bundle. build-storybook uses a
  # different entrypoint/bundler than `pnpm build` (Next.js) and is a render
  # surface the vitest `storybook-tests` job never exercises, so neither of
  # those covers it. Without this job, build-storybook runs only inside the
  # advisory, story-gated screenshots job (under continue-on-error), where a
  # broken Storybook build is masked (neutralized) and — for a non-story change
  # like a .storybook/ or preview/addon edit — never even runs. This job closes
  # both holes. It is browser-free (build only, no render), so it omits the
  # playwright input. Render coverage of the built bundle stays advisory by
  # design (see docs/guidance / rmartz/ai#6).
  storybook-build:
    name: Storybook Build
    runs-on: ubuntu-latest
    timeout-minutes: 3
    needs: detect-changes
    if: needs.detect-changes.outputs.code_changed == 'true'
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: ./.github/actions/setup
      - run: pnpm build-storybook

  sentry-release:
    name: Sentry Release
    runs-on: ubuntu-latest
    timeout-minutes: 2
    if: github.event_name == 'push'
    needs:
      [tests, storybook-tests, lint, format, typecheck, build, storybook-build]
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
      - uses: getsentry/action-release@ff07929a6537bac57790c3451cf4d364aca38528 # v3.7.0
        env:
          SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}
          SENTRY_ORG: reedmartz
          SENTRY_PROJECT: hidden-role-game
        with:
          environment: production
          version: ${{ github.sha }}
          # Associate commits via an explicit range now that the repo is
          # connected to Sentry's GitHub integration. Manual mode is used over
          # `auto` deliberately: `auto` resolves the *previous release* and
          # needs its commit reachable — fragile with our squash-merge workflow
          # (a squashed preview commit as predecessor breaks it). Manual passes
          # an explicit range instead — github.event.before is main's tip before
          # this push (always a reachable main commit), so the range
          # (before, sha] is exactly the commits this push introduced, and
          # Sentry resolves them server-side through the GitHub integration.
          set_commits: manual
          repo: ${{ github.repository }}
          commit: ${{ github.sha }}
          previous_commit: ${{ github.event.before }}
