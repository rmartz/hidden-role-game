name: CI

on:
  push:
    branches: ["main"]
  pull_request:

permissions:
  contents: read

jobs:
  tests:
    name: Tests
    runs-on: ubuntu-latest
    timeout-minutes: 2
    steps:
      - uses: actions/checkout@v7
      - uses: ./.github/actions/setup
      # Headless suites only (node / hooks / components) — no browser, so this
      # job stays fast and skips the Playwright install. The browser-based
      # storybook project runs separately in `storybook-tests`.
      - run: pnpm exec vitest run --project node --project hooks --project components

  storybook-tests:
    name: Storybook Tests
    runs-on: ubuntu-latest
    timeout-minutes: 4
    steps:
      - uses: actions/checkout@v7
      - uses: ./.github/actions/setup
        with:
          playwright: chromium
      - run: pnpm exec vitest run --project storybook

  lint:
    name: Lint
    runs-on: ubuntu-latest
    timeout-minutes: 2
    steps:
      - uses: actions/checkout@v7
      - uses: ./.github/actions/setup
      - run: pnpm lint

  format:
    name: Format
    runs-on: ubuntu-latest
    timeout-minutes: 2
    steps:
      - uses: actions/checkout@v7
      - uses: ./.github/actions/setup
      - run: pnpm run format:check

  typecheck:
    name: Typecheck
    runs-on: ubuntu-latest
    timeout-minutes: 1
    steps:
      - uses: actions/checkout@v7
      - uses: ./.github/actions/setup
      - run: pnpm tsc

  build:
    name: Build
    runs-on: ubuntu-latest
    timeout-minutes: 2
    steps:
      - uses: actions/checkout@v7
      - uses: ./.github/actions/setup
      - run: pnpm build

  # Gating coverage for the production Storybook bundle. build-storybook uses a
  # different entrypoint/bundler than `pnpm build` (Next.js) and is a render
  # surface the vitest `storybook-tests` job never exercises, so neither of
  # those covers it. Without this job, build-storybook runs only inside the
  # advisory, story-gated screenshots job (under continue-on-error), where a
  # broken Storybook build is masked (neutralized) and — for a non-story change
  # like a .storybook/ or preview/addon edit — never even runs. This job closes
  # both holes. It is browser-free (build only, no render), so it omits the
  # playwright input. Render coverage of the built bundle stays advisory by
  # design (see docs/guidance / rmartz/ai#6).
  storybook-build:
    name: Storybook Build
    runs-on: ubuntu-latest
    timeout-minutes: 3
    steps:
      - uses: actions/checkout@v7
      - uses: ./.github/actions/setup
      - run: pnpm build-storybook

  sentry-release:
    name: Sentry Release
    runs-on: ubuntu-latest
    timeout-minutes: 2
    if: github.event_name == 'push'
    needs: [tests, storybook-tests, lint, format, typecheck, build]
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
      - uses: getsentry/action-release@v3
        env:
          SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}
          SENTRY_ORG: reedmartz
          SENTRY_PROJECT: hidden-role-game
        with:
          environment: production
          version: ${{ github.sha }}
          # Associate commits via an explicit range now that the repo is
          # connected to Sentry's GitHub integration. Manual mode is used over
          # `auto` deliberately: `auto` resolves the *previous release* and
          # needs its commit reachable — fragile with our squash-merge workflow
          # (a squashed preview commit as predecessor breaks it). Manual passes
          # an explicit range instead — github.event.before is main's tip before
          # this push (always a reachable main commit), so the range
          # (before, sha] is exactly the commits this push introduced, and
          # Sentry resolves them server-side through the GitHub integration.
          set_commits: manual
          repo: ${{ github.repository }}
          commit: ${{ github.sha }}
          previous_commit: ${{ github.event.before }}
