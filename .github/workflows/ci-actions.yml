name: CI

on:
  push:
    branches: ["main"]
  pull_request:

permissions:
  contents: read

jobs:
  tests:
    name: Tests
    runs-on: ubuntu-latest
    timeout-minutes: 2
    steps:
      - uses: actions/checkout@v7
      - uses: ./.github/actions/setup
      # Headless suites only (node / hooks / components) — no browser, so this
      # job stays fast and skips the Playwright install. The browser-based
      # storybook project runs separately in `storybook-tests`.
      - run: pnpm exec vitest run --project node --project hooks --project components

  storybook-tests:
    name: Storybook Tests
    runs-on: ubuntu-latest
    timeout-minutes: 4
    steps:
      - uses: actions/checkout@v7
      - uses: ./.github/actions/setup
        with:
          playwright: chromium
      - run: pnpm exec vitest run --project storybook

  lint:
    name: Lint
    runs-on: ubuntu-latest
    timeout-minutes: 2
    steps:
      - uses: actions/checkout@v7
      - uses: ./.github/actions/setup
      - run: pnpm lint

  format:
    name: Format
    runs-on: ubuntu-latest
    timeout-minutes: 2
    steps:
      - uses: actions/checkout@v7
      - uses: ./.github/actions/setup
      - run: pnpm run format:check

  typecheck:
    name: Typecheck
    runs-on: ubuntu-latest
    timeout-minutes: 1
    steps:
      - uses: actions/checkout@v7
      - uses: ./.github/actions/setup
      - run: pnpm tsc

  build:
    name: Build
    runs-on: ubuntu-latest
    timeout-minutes: 2
    steps:
      - uses: actions/checkout@v7
      - uses: ./.github/actions/setup
      - run: pnpm build

  sentry-release:
    name: Sentry Release
    runs-on: ubuntu-latest
    timeout-minutes: 2
    if: github.event_name == 'push'
    needs: [tests, storybook-tests, lint, format, typecheck, build]
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
      - uses: getsentry/action-release@v3
        env:
          SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}
          SENTRY_ORG: reedmartz
          SENTRY_PROJECT: hidden-role-game
        with:
          environment: production
          version: ${{ github.sha }}
          # Associate commits explicitly instead of `set_commits: auto`. Auto
          # resolves the *previous release* and needs its commit to exist in
          # git history; because we squash-merge (and Vercel builds create
          # releases keyed on commit SHAs), the previous release is often a
          # commit that no longer exists on main, so auto fails with "Could not
          # find the SHA of the previous release". Manual mode uses an explicit
          # range: github.event.before is main's tip before this push — always a
          # reachable main commit — so the range (before, sha] is exactly the
          # commits this push introduced.
          set_commits: manual
          repo: ${{ github.repository }}
          commit: ${{ github.sha }}
          previous_commit: ${{ github.event.before }}
