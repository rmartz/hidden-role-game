name: Claude Code Review

on:
  workflow_dispatch:
    inputs:
      pr_number:
        description: "PR number to review"
        required: true
        type: number

jobs:
  review:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
      issues: write
      id-token: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          prompt: |
            Review pull request #${{ inputs.pr_number }} for code quality, correctness, and security.
            Analyze the diff and post your findings as review comments.
            Focus on:
            - Bugs or logic errors
            - Security vulnerabilities
            - TypeScript type safety issues
            - Missing edge cases
            Do not comment on style or formatting — those are handled by CI linting.
          claude_args: "--max-turns 5"
