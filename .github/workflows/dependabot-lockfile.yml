name: Regenerate pnpm lockfile for Dependabot

on:
  pull_request_target:
    branches: ["main"]

permissions:
  contents: read

jobs:
  regenerate-lockfile:
    name: Regenerate lockfile
    if: github.actor == 'dependabot[bot]'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      # Checkout the PR branch to get the updated package.json.
      # Safe because this job only runs for dependabot[bot] PRs.
      - uses: actions/checkout@v6
        with:
          ref: ${{ github.head_ref }}
          token: ${{ secrets.CI_PAT_TOKEN }}
          persist-credentials: true
      - uses: ./.github/actions/setup
        with:
          frozen-lockfile: "false"
      - name: Commit updated lockfile
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add pnpm-lock.yaml
          git diff --staged --quiet || git commit -m "chore: regenerate pnpm-lock.yaml for Dependabot"
          git push
