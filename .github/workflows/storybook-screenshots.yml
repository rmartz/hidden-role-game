name: Storybook Screenshots

on:
  pull_request:
    branches: ["main"]
    paths:
      - "src/**/*.stories.tsx"
      - "src/**/*.stories.ts"

permissions:
  contents: write
  pull-requests: write

# Per-PR concurrency: serialize only same-PR runs (cancel the older when a newer
# one starts). Cross-PR safety needs no group — each PR force-pushes its own
# image branch (gh-screenshots-pr-<N>), so two different PRs never share a
# resource. This group only stops two runs of the SAME PR force-pushing at once.
concurrency:
  group: storybook-screenshots-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  screenshots:
    name: Capture Storybook Screenshots
    runs-on: ubuntu-latest
    # Advisory: this is preview tooling (posts a screenshot gallery), not a
    # correctness gate. It depends on Playwright + a git push + the GitHub API,
    # any of which can fail transiently. A failure must never block a code
    # merge, so report green regardless. The timeout-minutes below still bounds
    # a hang.
    continue-on-error: true
    timeout-minutes: 5
    # Forked PRs receive a read-only GITHUB_TOKEN that cannot push to the
    # gh-screenshots branch, so skip them rather than fail.
    if: github.event.pull_request.head.repo.full_name == github.repository
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Fetch base branch
        run: git fetch origin ${{ github.base_ref }}

      - name: Detect changed story files
        id: stories
        run: |
          CHANGED=$(git diff --name-only --diff-filter=ACMR origin/${{ github.base_ref }}...HEAD \
            -- 'src/**/*.stories.tsx' 'src/**/*.stories.ts')
          if [ -z "$CHANGED" ]; then
            echo "found=false" >> "$GITHUB_OUTPUT"
          else
            echo "found=true" >> "$GITHUB_OUTPUT"
            printf 'files<<EOF\n%s\nEOF\n' "$CHANGED" >> "$GITHUB_OUTPUT"
          fi

      - uses: ./.github/actions/setup
        if: steps.stories.outputs.found == 'true'

      - name: Install Playwright Chromium
        if: steps.stories.outputs.found == 'true'
        run: pnpm exec playwright install --with-deps chromium

      - name: Build Storybook
        if: steps.stories.outputs.found == 'true'
        run: pnpm build-storybook

      - name: Capture screenshots and post PR comment
        if: steps.stories.outputs.found == 'true'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          CHANGED_FILES: ${{ steps.stories.outputs.files }}
          PR_HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        run: node .github/scripts/storybook-screenshots.mjs
