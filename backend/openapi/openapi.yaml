openapi: 3.0.0
components:
  examples: {}
  headers: {}
  parameters: {}
  requestBodies: {}
  responses: {}
  schemas:
    ServerResponseStatus.Success:
      enum:
        - success
      type: string
    PublicLobbyPlayer:
      properties:
        id:
          type: string
        name:
          type: string
      required:
        - id
        - name
      type: object
      additionalProperties: false
    GameStatus.Starting:
      enum:
        - Starting
      type: string
    StartingGameStatus:
      properties:
        type:
          $ref: "#/components/schemas/GameStatus.Starting"
      required:
        - type
      type: object
      additionalProperties: false
    GameStatus.Playing:
      enum:
        - Playing
      type: string
    PlayingGameStatus:
      properties:
        type:
          $ref: "#/components/schemas/GameStatus.Playing"
      required:
        - type
      type: object
      additionalProperties: false
    GameStatus.Finished:
      enum:
        - Finished
      type: string
    FinishedGameStatus:
      properties:
        type:
          $ref: "#/components/schemas/GameStatus.Finished"
      required:
        - type
      type: object
      additionalProperties: false
    GameStatusState:
      anyOf:
        - $ref: "#/components/schemas/StartingGameStatus"
        - $ref: "#/components/schemas/PlayingGameStatus"
        - $ref: "#/components/schemas/FinishedGameStatus"
    PublicLobby:
      properties:
        id:
          type: string
        players:
          items:
            $ref: "#/components/schemas/PublicLobbyPlayer"
          type: array
        game:
          properties:
            players:
              items:
                $ref: "#/components/schemas/PublicLobbyPlayer"
              type: array
            status:
              $ref: "#/components/schemas/GameStatusState"
          required:
            - players
            - status
          type: object
      required:
        - id
        - players
      type: object
      additionalProperties: false
    LobbyJoinResponse:
      properties:
        lobby:
          $ref: "#/components/schemas/PublicLobby"
        sessionId:
          type: string
      required:
        - lobby
        - sessionId
      type: object
      additionalProperties: false
    ServerResponseStatus:
      enum:
        - success
        - error
      type: string
    ServerSuccess_LobbyJoinResponse_:
      properties:
        status:
          $ref: "#/components/schemas/ServerResponseStatus.Success"
        data:
          $ref: "#/components/schemas/LobbyJoinResponse"
      required:
        - status
        - data
      type: object
      additionalProperties: false
    ServerResponseStatus.Error:
      enum:
        - error
      type: string
    ServerError:
      properties:
        status:
          $ref: "#/components/schemas/ServerResponseStatus.Error"
        error:
          type: string
      required:
        - status
        - error
      type: object
      additionalProperties: false
    ServerResponse_LobbyJoinResponse_:
      anyOf:
        - $ref: "#/components/schemas/ServerSuccess_LobbyJoinResponse_"
        - $ref: "#/components/schemas/ServerError"
    CreateLobbyRequest:
      properties:
        playerName:
          type: string
      required:
        - playerName
      type: object
      additionalProperties: false
    ServerSuccess_PublicLobby_:
      properties:
        status:
          $ref: "#/components/schemas/ServerResponseStatus.Success"
        data:
          $ref: "#/components/schemas/PublicLobby"
      required:
        - status
        - data
      type: object
      additionalProperties: false
    ServerResponse_PublicLobby_:
      anyOf:
        - $ref: "#/components/schemas/ServerSuccess_PublicLobby_"
        - $ref: "#/components/schemas/ServerError"
    JoinLobbyRequest:
      properties:
        playerName:
          type: string
      required:
        - playerName
      type: object
      additionalProperties: false
  securitySchemes: {}
info:
  title: "@secret-villain/backend"
  version: 1.0.0
  description: NodeJS server for secret villain game
  license:
    name: ISC
  contact:
    name: Reed Martz
paths:
  /lobby/create:
    post:
      operationId: CreateLobby
      responses:
        "200":
          description: Created lobby plus the owner's session ID
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ServerResponse_LobbyJoinResponse_"
        "500":
          description: Server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ServerError"
      description: Create a new lobby. The requesting player becomes the first player
        and owner.
      security: []
      parameters: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateLobbyRequest"
  /lobby/{lobbyId}:
    get:
      operationId: GetLobby
      responses:
        "200":
          description: The lobby (no session IDs exposed)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ServerResponse_PublicLobby_"
        "404":
          description: Lobby not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ServerError"
      description: Get a lobby by ID. Requires a valid x-session-id header.
      security: []
      parameters:
        - description: The lobby ID
          in: path
          name: lobbyId
          required: true
          schema:
            type: string
        - in: header
          name: x-session-id
          required: false
          schema:
            type: string
  /lobby/{lobbyId}/join:
    post:
      operationId: JoinLobby
      responses:
        "200":
          description: Updated lobby with new player, plus that player's session ID
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ServerResponse_LobbyJoinResponse_"
        "201":
          description: Player joined successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ServerResponse_LobbyJoinResponse_"
        "404":
          description: Lobby not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ServerError"
      description: Join a lobby
      security: []
      parameters:
        - description: The lobby ID
          in: path
          name: lobbyId
          required: true
          schema:
            type: string
      requestBody:
        description: Player name
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/JoinLobbyRequest"
              description: Player name
servers:
  - url: /
